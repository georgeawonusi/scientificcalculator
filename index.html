<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="calculator">
    <input type="text" id="display" readonly>
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">AC</button>
      <button onclick="appendValue('%')">%</button>
      <button onclick="appendValue('/')">÷</button>
      <button onclick="toggleSign()">±</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button onclick="appendValue('*')">×</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button onclick="appendValue('-')">−</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button onclick="appendValue('+')">+</button>

      <button onclick="appendValue('.')">.</button>
      <button onclick="appendValue('0')">0</button>
      <button onclick="calculate()">=</button>
      <button class="delete" onclick="deleteLast()">⌫</button>

      <!-- Scientific Buttons -->
      <button onclick="appendValue('π')">π</button>
      <button onclick="appendValue('e')">e</button>
      <button onclick="appendValue('√')">√</button>
      <button onclick="appendValue('^')">x²</button>

      <button class="scientific" onclick="appendValue('sin(')">sin</button>
      <button onclick="appendValue('cos(')">cos</button>
      <button onclick="appendValue('tan(')">tan</button>
      <button onclick="appendValue('log(')">log</button>

      <button onclick="appendValue('(')">(</button>
      <button onclick="toggleHistory()">S H</button>
      <button onclick="appendValue(')')">)</button>
      <button id="modeToggle" onclick="toggleDegreeMode()">Deg</button>



    </div>
  </div>
  <script src="./js/script.js"></script>
</body>
</html>
